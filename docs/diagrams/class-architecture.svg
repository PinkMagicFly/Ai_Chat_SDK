<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <style>
    .box { fill:#f7f9fc; stroke:#334155; stroke-width:2; rx:8; ry:8; }
    .title { font: 700 20px Arial, sans-serif; fill:#0f172a; }
    .txt { font: 16px Arial, sans-serif; fill:#0f172a; }
    .arrow { stroke:#334155; stroke-width:2; marker-end:url(#arrowhead); fill:none; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <text x="30" y="40" class="title">ChatSDK Class Architecture</text>

  <rect class="box" x="60" y="90" width="230" height="120" />
  <text x="90" y="130" class="txt">ChatSDK</text>
  <text x="90" y="160" class="txt">+ initializeSDK()</text>
  <text x="90" y="185" class="txt">+ createSession()</text>

  <rect class="box" x="380" y="80" width="230" height="80" />
  <text x="430" y="125" class="txt">LLMManager</text>

  <rect class="box" x="380" y="190" width="230" height="80" />
  <text x="410" y="235" class="txt">SessionManager</text>

  <rect class="box" x="700" y="80" width="220" height="80" />
  <text x="750" y="125" class="txt">LLMProvider</text>

  <rect class="box" x="980" y="40" width="180" height="60" />
  <text x="1000" y="75" class="txt">DeepSeekProvider</text>
  <rect class="box" x="980" y="110" width="180" height="60" />
  <text x="1004" y="145" class="txt">ChatGPTProvider</text>
  <rect class="box" x="980" y="180" width="180" height="60" />
  <text x="1010" y="215" class="txt">GeminiProvider</text>
  <rect class="box" x="980" y="250" width="180" height="60" />
  <text x="1010" y="285" class="txt">OllamaProvider</text>

  <rect class="box" x="700" y="220" width="220" height="70" />
  <text x="780" y="263" class="txt">Session</text>

  <rect class="box" x="380" y="340" width="190" height="60" />
  <text x="445" y="377" class="txt">Config</text>
  <rect class="box" x="640" y="340" width="190" height="60" />
  <text x="690" y="377" class="txt">APIConfig</text>
  <rect class="box" x="900" y="340" width="190" height="60" />
  <text x="940" y="377" class="txt">OllamaConfig</text>

  <line class="arrow" x1="290" y1="120" x2="380" y2="120"/>
  <line class="arrow" x1="290" y1="185" x2="380" y2="225"/>
  <line class="arrow" x1="610" y1="120" x2="700" y2="120"/>
  <line class="arrow" x1="610" y1="230" x2="700" y2="255"/>

  <line class="arrow" x1="920" y1="120" x2="980" y2="70"/>
  <line class="arrow" x1="920" y1="120" x2="980" y2="140"/>
  <line class="arrow" x1="920" y1="120" x2="980" y2="210"/>
  <line class="arrow" x1="920" y1="120" x2="980" y2="280"/>

  <line class="arrow" x1="570" y1="370" x2="640" y2="370"/>
  <line class="arrow" x1="570" y1="370" x2="900" y2="370"/>
</svg>
