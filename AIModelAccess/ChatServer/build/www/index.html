<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIChat 智能聊天助手</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <defs>
                <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#ff8a65"></stop>
                  <stop offset="100%" stop-color="#0f766e"></stop>
                </linearGradient>
              </defs>
              <rect x="8" y="8" width="48" height="48" rx="16" fill="url(#brandGradient)"></rect>
              <path d="M21 24h8l11 17h-8l-2.1-3.5h-7.7L20 41h-7.8L21 24zm4.9 8.1-1.9 3.3h4.1l-2.2-3.3z" fill="#fff"></path>
            </svg>
          </div>
          <div class="brand-text">
            <strong>AIChat</strong>
            <span>AI工聊天助手</span>
          </div>
        </div>
        <button id="headerNewChatBtn" class="btn btn-primary" type="button">新建对话</button>
      </div>

      <div class="sidebar-meta">
        <span>历史会话</span>
        <span id="sessionCount">0 条</span>
      </div>

      <div id="sessionList" class="session-list" aria-live="polite"></div>
    </aside>

    <main class="main-panel">
      <section id="welcomeState" class="welcome-state">
        <div class="welcome-orbit orbit-one"></div>
        <div class="welcome-orbit orbit-two"></div>
        <div class="welcome-card">
          <div class="welcome-icon" aria-hidden="true">
            <svg viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="32" fill="#fff7ed"></circle>
              <path d="M24 45c0-10.5 7.6-19 17-19s17 8.5 17 19v7H24v-7z" fill="#fb923c"></path>
              <circle cx="40" cy="30" r="10" fill="#0f766e"></circle>
            </svg>
          </div>
          <h1>选择一个历史对话继续，或创建新的对话，开启您的AI之旅</h1>
          <p>支持多模型会话、历史消息查看与流式输出，适合持续追问与代码类问答。</p>
          <button id="emptyNewChatBtn" class="btn btn-primary btn-large" type="button">新建对话</button>
        </div>
      </section>

      <section id="chatWorkspace" class="chat-workspace hidden">
        <header class="chat-header">
          <div>
            <h2 id="chatTitle">新会话</h2>
            <p id="chatSubtitle">选择模型并开始对话</p>
          </div>
          <div id="streamingBadge" class="streaming-badge hidden">回复生成中</div>
        </header>

        <div id="messageList" class="message-list" aria-live="polite"></div>

        <footer class="composer-wrap">
          <div class="composer-panel">
            <textarea
              id="messageInput"
              class="composer-input"
              rows="1"
              maxlength="2000"
              placeholder="请输入您的消息...（Enter发送，Shift+Enter换行）"
            ></textarea>
            <div class="composer-actions">
              <button id="sendButton" class="btn btn-primary send-button" type="button">发送</button>
              <span id="charCount" class="char-count">0/2000</span>
            </div>
          </div>
        </footer>
      </section>
    </main>
  </div>

  <div id="modelModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modelModalTitle">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <h3 id="modelModalTitle">选择会话模型</h3>
          <p>每次仅可选择一个模型作为当前对话的回答引擎。</p>
        </div>
        <button id="closeModalBtn" class="icon-button" type="button" aria-label="关闭">×</button>
      </div>
      <div id="modelList" class="model-grid"></div>
      <div class="modal-actions">
        <button id="cancelCreateSessionBtn" class="btn btn-secondary" type="button">取消</button>
        <button id="confirmCreateSessionBtn" class="btn btn-primary" type="button">确定</button>
      </div>
    </div>
  </div>

  <template id="sessionItemTemplate">
    <article class="session-item" tabindex="0" role="button">
      <div class="session-item-top">
        <span class="session-updated-at"></span>
        <button class="session-delete-btn" type="button" aria-label="删除会话">删除会话</button>
      </div>
      <strong class="session-preview"></strong>
      <div class="session-item-bottom">
        <span class="session-model"></span>
        <span class="session-message-count"></span>
      </div>
    </article>
  </template>

  <template id="messageTemplate">
    <article class="message-item">
      <div class="message-bubble">
        <div class="message-role"></div>
        <div class="message-content markdown-body"></div>
        <div class="message-time"></div>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
